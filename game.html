<!DOCTYPE html>
<html>
<body style="text-align: center; font-family: sans-serif; background-color: #222; color: white; margin-top: 50px;">
    <h2>Chicken Nugget Run</h2>
    <canvas id="game" width="600" height="200" style="border:3px solid #FFCC33; background: #333; display: block; margin: 0 auto;"></canvas>
    <p>Press <b>Space</b> or <b>Click the Game</b> to jump!</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Game States: "MENU", "PLAYING", "GAMEOVER"
let gameState = "MENU"; 

let score = 0;
let highScore = localStorage.getItem("nuggetHighScore") || 0;

let nugget = { x: 50, y: 150, size: 36, dy: 0, grounded: true };
let fry = { x: 600, width: 16, height: 40, count: 1, speed: 6 };

function jump() {
    if (gameState === "PLAYING" && nugget.grounded) {
        nugget.dy = -12;
        nugget.grounded = false;
    }
}

// Controls
document.addEventListener("keydown", (e) => { 
    if (e.code === "Space") {
        e.preventDefault(); // Stop spacebar from scrolling page
        if (gameState === "MENU") startGame();
        else if (gameState === "GAMEOVER") resetToMenu();
        else jump();
    }
});

canvas.addEventListener("mousedown", (e) => {
    if (gameState === "MENU") {
        // Simple click check for the Play Button
        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        // Button area is roughly center
        if (clickX > 230 && clickX < 370 && clickY > 110 && clickY < 155) {
            startGame();
        }
    } else if (gameState === "GAMEOVER") {
        resetToMenu();
    } else {
        jump();
    }
});

function startGame() {
    score = 0;
    nugget.y = 150;
    nugget.dy = 0;
    nugget.grounded = true;
    spawnObstacle();
    gameState = "PLAYING";
}

function resetToMenu() {
    gameState = "MENU";
}

function spawnObstacle() {
    fry.x = 650;
    // Randomly spawn either 1 or 2 fries side-by-side
    fry.count = Math.random() < 0.4 ? 2 : 1; 
    // Randomly vary the height slightly
    fry.height = 35 + Math.floor(Math.random() * 15);
}

function update() {
    ctx.clearRect(0, 0, 600, 200);

    if (gameState === "MENU") {
        // Title Screen
        ctx.fillStyle = "#FFCC33";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText("CHICKEN NUGGET RUN", 150, 60);

        ctx.fillStyle = "#FFF";
        ctx.font = "16px sans-serif";
        ctx.fillText("HIGH SCORE: " + highScore, 240, 95);

        // Play Button
        ctx.fillStyle = "#CC0000";
        ctx.fillRect(230, 110, 140, 45);
        ctx.fillStyle = "#FFF";
        ctx.font = "bold 18px sans-serif";
        ctx.fillText("PLAY", 278, 138);

    } else if (gameState === "PLAYING") {
        // Score progression
        score++;

        // Physics
        nugget.dy += 0.6; // Gravity
        nugget.y += nugget.dy;

        // Floor logic
        if (nugget.y + nugget.size > 200) {
            nugget.y = 200 - nugget.size;
            nugget.dy = 0;
            nugget.grounded = true;
        }

        // Move obstacle (fries speed increases slightly over time)
        let currentSpeed = fry.speed + Math.floor(score / 500);
        fry.x -= currentSpeed;
        
        if (fry.x < -40) {
            spawnObstacle();
        }

        // Collision detection
        let totalObstacleWidth = fry.width * fry.count;
        if (nugget.x < fry.x + totalObstacleWidth && nugget.x + nugget.size > fry.x && 
            nugget.y + nugget.size > 200 - fry.height) {
            
            // Handle Game Over
            gameState = "GAMEOVER";
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("nuggetHighScore", highScore);
            }
        }

        // DRAW NUGGET (With Crazy Face!)
        ctx.fillStyle = "#FFCC33"; // Golden yellow
        // Round the corners of the nugget a bit
        ctx.beginPath();
        ctx.roundRect(nugget.x, nugget.y, nugget.size, nugget.size, 8);
        ctx.fill();

        // Crazy Eyes (One big, one small, looking different ways)
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(nugget.x + 11, nugget.y + 12, 6, 0, Math.PI * 2); // Left eye (big)
        ctx.arc(nugget.x + 24, nugget.y + 10, 4, 0, Math.PI * 2); // Right eye (small)
        ctx.fill();

        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(nugget.x + 13, nugget.y + 14, 2, 0, Math.PI * 2); // Pupil 1
        ctx.arc(nugget.x + 23, nugget.y + 8, 1.5, 0, Math.PI * 2); // Pupil 2
        ctx.fill();

        // Crazy Zig-Zag / Open Screaming Mouth
        ctx.fillStyle = "#500";
        ctx.beginPath();
        ctx.arc(nugget.x + 18, nugget.y + 24, 5, 0, Math.PI, false); // Screaming semi-circle
        ctx.fill();
        
        // Crazy Eyebrows
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.beginPath();
        // Left eyebrow angled up
        ctx.moveTo(nugget.x + 5, nugget.y + 5);
        ctx.lineTo(nugget.x + 15, nugget.y + 3);
        // Right eyebrow angled down
        ctx.moveTo(nugget.x + 20, nugget.y + 2);
        ctx.lineTo(nugget.x + 28, nugget.y + 6);
        ctx.stroke();

        // DRAW FRIES (Obstacles)
        ctx.fillStyle = "#E2B13C"; // Inner fry color
        for (let i = 0; i < fry.count; i++) {
            let offset = i * (fry.width + 2);
            // Draw red fry sleeve base
            ctx.fillStyle = "#CC0000";
            ctx.fillRect(fry.x + offset, 200 - fry.height + 15, fry.width, fry.height - 15);
            // Draw yellow potato top
            ctx.fillStyle = "#FFD700";
            ctx.fillRect(fry.x + offset, 200 - fry.height, fry.width, 15);
        }

        // Draw HUD (Score)
        ctx.fillStyle = "#FFF";
        ctx.font = "16px sans-serif";
        ctx.fillText("SCORE: " + score, 10, 25);
        ctx.fillText("HI: " + highScore, 10, 45);

    } else if (gameState === "GAMEOVER") {
        // Game Over screen overlay
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, 600, 200);

        ctx.fillStyle = "#FF3333";
        ctx.font = "bold 30px sans-serif";
        ctx.fillText("GAME OVER", 205, 80);

        ctx.fillStyle = "#FFF";
        ctx.font = "16px sans-serif";
        ctx.fillText("Your Score: " + score, 245, 115);
        ctx.fillText("Click or Press Space to Menu", 195, 150);
    }

    requestAnimationFrame(update);
}

// Start game loop
update();
</script>
</body>
</html>
