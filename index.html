<!DOCTYPE html>
<html>
<head>
    <title>My First Web Game</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { background: #222; border: 4px solid #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Player setup
        let player = { x: 180, y: 440, width: 40, height: 40, color: "#00ffcc" };
        let obstacle = { x: Math.random() * 360, y: 0, size: 40, speed: 5, color: "#ff0055" };
        let score = 0;
        let gameOver = false;

        // Listen for mouse/touch movement
        window.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.width / 2;
        });

        function update() {
            if (gameOver) return;

            // Move falling obstacle
            obstacle.y += obstacle.speed;
            if (obstacle.y > canvas.height) {
                obstacle.y = 0;
                obstacle.x = Math.random() * (canvas.width - obstacle.size);
                obstacle.speed += 0.5; // Make it faster!
                score++;
            }

            // Simple Box Collision Detection
            if (player.x < obstacle.x + obstacle.size &&
                player.x + player.width > obstacle.x &&
                player.y < obstacle.y + obstacle.size &&
                player.y + player.height > obstacle.y) {
                gameOver = true;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw obstacle
            ctx.fillStyle = obstacle.color;
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.size, obstacle.size);

            // Draw score
            ctx.fillStyle = "#fff";
            ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 20, 30);

            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff0055";
                ctx.font = "30px Arial";
                ctx.fillText("GAME OVER", 110, 250);
                ctx.fillStyle = "#fff";
                ctx.font = "16px Arial";
                ctx.fillText("Refresh the page to try again!", 100, 290);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
