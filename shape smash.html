<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAPE SMASH: CYBER EDITION</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #030108;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 520px;
            height: 520px;
            border: 4px solid #39ff14;
            background: #020005;
            box-shadow: 0 0 35px rgba(57, 255, 20, 0.3), inset 0 0 20px rgba(255, 0, 127, 0.2);
        }
        canvas {
            display: block;
            background: #020005;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f0524 0%, #030108 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 15px;
        }
        h1 {
            font-size: 34px;
            letter-spacing: 5px;
            margin: 0 0 6px 0;
            color: #39ff14;
            text-shadow: 0 0 15px #39ff14, 0 0 30px #ff007f;
        }
        .subtitle {
            font-size: 10px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #00f3ff;
            text-transform: uppercase;
        }
        .btn-cyber {
            background: transparent;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 10px 30px;
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            letter-spacing: 3px;
            transition: 0.3s;
            margin: 6px;
            font-weight: bold;
            box-shadow: 0 0 12px rgba(57, 255, 20, 0.2);
            position: relative;
            overflow: hidden;
        }
        .btn-cyber:hover {
            background: #39ff14;
            color: #030108;
            box-shadow: 0 0 25px #39ff14;
            transform: scale(1.05);
        }
        #hud {
            position: absolute;
            top: 8px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 5;
            background: rgba(3, 1, 8, 0.85);
            border: 1px solid rgba(57, 255, 20, 0.4);
            padding: 5px 10px;
            color: #39ff14;
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.2);
        }
        .hidden {
            display: none !important;
        }
        .menu-box {
            border: 1px dashed rgba(0, 243, 255, 0.4);
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 12px rgba(0, 243, 255, 0.1);
        }
        .controls-hint {
            font-size: 9px;
            color: #8c83a5;
            margin-top: 15px;
            line-height: 1.5;
            letter-spacing: 1px;
        }
        .stat-highlight {
            color: #ff007f;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="hidden">
        <div>SCORE: <span id="score-val" class="stat-highlight">0</span></div>
        <div>COMBO: x<span id="combo-val" class="stat-highlight">1</span></div>
        <div>BALLS: <span id="lives-val" class="stat-highlight">3</span></div>
        <div>LVL: <span id="level-val" class="stat-highlight">1</span></div>
    </div>

    <canvas id="gameCanvas" width="520" height="520"></canvas>

    <div id="menu-screen" class="screen">
        <div class="menu-box">
            <h1>SHAPE SMASH</h1>
            <div class="subtitle">CYBER ARCADE MATRIX</div>
            <button class="btn-cyber" id="start-btn">INITIALIZE</button>
            <div class="controls-hint">
                [MOUSE / ARROWS] MOVE PADDLE<br>
                [SPACEBAR] FIRE LASER<br>
                FIXED BALL SPEED • SQUARE MATRIX
            </div>
        </div>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <div class="menu-box">
            <h1 id="gameover-title" style="color: #ff007f; text-shadow: 0 0 15px #ff007f;">SYSTEM FAIL</h1>
            <div class="subtitle" style="color: #fff;">FINAL SCORE: <span id="final-score" class="stat-highlight">0</span></div>
            <button class="btn-cyber" id="restart-btn" style="border-color: #ff007f; color: #ff007f;">REBOOT</button>
            <button class="btn-cyber" id="menu-btn" style="border-color: #00f3ff; color: #00f3ff;">MAIN MENU</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const menuScreen = document.getElementById('menu-screen');
    const gameOverScreen = document.getElementById('gameover-screen');
    const hud = document.getElementById('hud');
    const scoreVal = document.getElementById('score-val');
    const comboVal = document.getElementById('combo-val');
    const livesVal = document.getElementById('lives-val');
    const levelVal = document.getElementById('level-val');
    const finalScore = document.getElementById('final-score');
    const gameoverTitle = document.getElementById('gameover-title');

    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'hit') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(320, now);
                osc.frequency.exponentialRampToValueAtTime(90, now + 0.05);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'brick') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.08);
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'powerup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(550, now);
                osc.frequency.exponentialRampToValueAtTime(1500, now + 0.15);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'laser') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(1100, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'shield') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(650, now + 0.2);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'loss') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, now);
                osc.frequency.linearRampToValueAtTime(35, now + 0.4);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        } catch (e) {}
    }

    let gameState = 'MENU';
    let score = 0;
    let lives = 3;
    let level = 1;
    let combo = 1;
    let shakeTimer = 0;

    let rightPressed = false;
    let leftPressed = false;
    let spacePressed = false;
    let mouseX = canvas.width / 2;

    const basePaddleWidth = 85;
    let paddle = {
        x: canvas.width / 2 - 42,
        y: canvas.height - 35,
        width: basePaddleWidth,
        height: 10,
        dx: 9,
        hasLasers: false,
        laserTimer: 0,
        hasShield: false
    };

    let balls = [];
    let bricks = [];
    let powerUps = [];
    let lasers = [];

    const shapesList = ['heart', 'star', 'circle', 'triangle', 'diamond', 'square'];
    const neonColors = ['#ff007f', '#00f3ff', '#39ff14', '#bf00ff', '#ffe600', '#ff5f1f'];

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = true;
        if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = true;
        if (e.key === ' ' || e.key === 'Spacebar') {
            if (!spacePressed && paddle.hasLasers && gameState === 'PLAYING') {
                shootLasers();
            }
            spacePressed = true;
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = false;
        if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = false;
        if (e.key === ' ' || e.key === 'Spacebar') spacePressed = false;
    });

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
    });

    document.getElementById('start-btn').addEventListener('click', () => { initAudio(); startGame(); });
    document.getElementById('restart-btn').addEventListener('click', () => { initAudio(); startGame(); });
    document.getElementById('menu-btn').addEventListener('click', () => { goToMenu(); });

    function goToMenu() {
        gameState = 'MENU';
        menuScreen.classList.remove('hidden');
        gameOverScreen.classList.add('hidden');
        hud.classList.add('hidden');
    }

    function startGame() {
        score = 0;
        lives = 3;
        level = 1;
        combo = 1;
        paddle.width = basePaddleWidth;
        menuScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        loadLevel();
        gameState = 'PLAYING';
    }

    function loadLevel() {
        bricks = [];
        let brickRowCount = Math.min(7, 3 + level);
        let brickColumnCount = Math.min(10, 6 + Math.floor(level / 2));
        
        let brickWidth = Math.max(34, 44 - (level * 2));
        let brickHeight = 14;
        let brickPadding = 4;
        
        let totalGridWidth = brickColumnCount * (brickWidth + brickPadding) - brickPadding;
        let brickOffsetLeft = (canvas.width - totalGridWidth) / 2;
        let brickOffsetTop = 50;

        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                if (level >= 2 && (r + c * 2) % 6 === 0 && r > 0 && r < brickRowCount - 1) {
                    continue;
                }

                let maxHits = 1;
                let scoreHardnessBonus = Math.floor(score / 400);
                if (r === 0 || scoreHardnessBonus >= 1) maxHits = 2;
                if (r === 1 && scoreHardnessBonus >= 2) maxHits = 3;

                let shapeIndex = (r + c * level) % shapesList.length;
                let colorIndex = (r + c) % neonColors.length;

                bricks.push({
                    x: c * (brickWidth + brickPadding) + brickOffsetLeft,
                    y: r * (brickHeight + brickPadding) + brickOffsetTop,
                    width: brickWidth,
                    height: brickHeight,
                    health: maxHits,
                    maxHealth: maxHits,
                    shape: shapesList[shapeIndex],
                    color: neonColors[colorIndex],
                    status: 1
                });
            }
        }
        resetBallAndKeepPaddle();
    }

    function resetBallAndKeepPaddle() {
        paddle.hasLasers = false;
        paddle.hasShield = false;

        let fixedSpeed = 6.2;
        
        balls = [{
            x: canvas.width / 2,
            y: paddle.y - 18,
            radius: 6,
            dx: 2.8 * (Math.random() > 0.5 ? 1 : -1),
            dy: -fixedSpeed,
            speed: fixedSpeed
        }];
        powerUps = [];
        lasers = [];
    }

    function triggerShake(intensity = 6) {
        shakeTimer = intensity;
    }

    function shootLasers() {
        playSound('laser');
        lasers.push({ x: paddle.x + 12, y: paddle.y, width: 3, height: 8, dy: -8 });
        lasers.push({ x: paddle.x + paddle.width - 15, y: paddle.y, width: 3, height: 8, dy: -8 });
    }

    function spawnPowerUp(x, y) {
        let shouldDrop = (Math.random() < 0.08); 
        
        if (shouldDrop) {
            const types = ['EX', 'MB', 'LS', 'SH'];
            let type = types[Math.floor(Math.random() * types.length)];
            
            if (type === 'EX' && Math.random() < 0.5) {
                type = 'SH';
            }

            powerUps.push({
                x: x + 12,
                y: y,
                width: 18,
                height: 10,
                dy: 2.2,
                type: type
            });
        }
    }

    function drawShape(type, cx, cy, size, color) {
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();

        if (type === 'circle') {
            ctx.arc(cx, cy, size * 0.38, 0, Math.PI * 2);
        } else if (type === 'square') {
            ctx.rect(cx - size * 0.32, cy - size * 0.32, size * 0.64, size * 0.64);
        } else if (type === 'triangle') {
            ctx.moveTo(cx, cy - size * 0.4);
            ctx.lineTo(cx + size * 0.35, cy + size * 0.3);
            ctx.lineTo(cx - size * 0.35, cy + size * 0.3);
            ctx.closePath();
        } else if (type === 'diamond') {
            ctx.moveTo(cx, cy - size * 0.4);
            ctx.lineTo(cx + size * 0.35, cy);
            ctx.lineTo(cx, cy + size * 0.4);
            ctx.lineTo(cx - size * 0.35, cy);
            ctx.closePath();
        } else if (type === 'star') {
            for (let i = 0; i < 5; i++) {
                let angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                let x = cx + Math.cos(angle) * (size * 0.35);
                let y = cy + Math.sin(angle) * (size * 0.35);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
        } else if (type === 'heart') {
            ctx.moveTo(cx, cy + size * 0.2);
            ctx.bezierCurveTo(cx, cy - size * 0.1, cx - size * 0.4, cy - size * 0.4, cx - size * 0.4, cy - size * 0.1);
            ctx.bezierCurveTo(cx - size * 0.4, cy + size * 0.2, cx, cy + size * 0.4, cx, cy + size * 0.4);
            ctx.bezierCurveTo(cx, cy + size * 0.4, cx + size * 0.4, cy + size * 0.2, cx + size * 0.4, cy - size * 0.1);
            ctx.bezierCurveTo(cx + size * 0.4, cy - size * 0.4, cx, cy - size * 0.1, cx, cy + size * 0.2);
        }
        ctx.stroke();
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        if (rightPressed) {
            paddle.x += paddle.dx;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        } else if (leftPressed) {
            paddle.x -= paddle.dx;
            if (paddle.x < 0) paddle.x = 0;
        } else {
            paddle.x = mouseX - paddle.width / 2;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        }

        if (paddle.hasLasers) {
            paddle.laserTimer--;
            if (paddle.laserTimer <= 0) paddle.hasLasers = false;
        }

        for (let i = lasers.length - 1; i >= 0; i--) {
            let l = lasers[i];
            l.y += l.dy;
            if (l.y < 0) {
                lasers.splice(i, 1);
                continue;
            }
            for (let b of bricks) {
                if (b.status === 1 && l.x > b.x && l.x < b.x + b.width && l.y > b.y && l.y < b.y + b.height) {
                    l.y = -10;
                    b.health--;
                    playSound('brick');
                    triggerShake(2);
                    if (b.health <= 0) {
                        b.status = 0;
                        score += 35 * level * combo;
                        spawnPowerUp(b.x, b.y);
                    }
                    break;
                }
            }
        }
        lasers = lasers.filter(l => l.y > 0);

        for (let i = powerUps.length - 1; i >= 0; i--) {
            let p = powerUps[i];
            p.y += p.dy;
            if (p.x < paddle.x + paddle.width && p.x + p.width > paddle.x && p.y + p.height > paddle.y && p.y < paddle.y + paddle.height) {
                playSound('powerup');
                if (p.type === 'EX') {
                    paddle.width = Math.min(canvas.width - 15, paddle.width + 30);
                } else if (p.type === 'MB') {
                    if (balls.length > 0) {
                        let b = balls[0];
                        balls.push({ x: b.x, y: b.y, radius: 6, dx: -b.dx, dy: b.dy, speed: b.speed });
                    }
                } else if (p.type === 'LS') {
                    paddle.hasLasers = true;
                    paddle.laserTimer = 180;
                } else if (p.type === 'SH') {
                    paddle.hasShield = true;
                    playSound('shield');
                }
                powerUps.splice(i, 1);
                continue;
            }
            if (p.y > canvas.height) powerUps.splice(i, 1);
        }

        for (let i = balls.length - 1; i >= 0; i--) {
            let ball = balls[i];
            
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.dx = -ball.dx;
                playSound('hit');
            } else if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius;
                ball.dx = -ball.dx;
                playSound('hit');
            }

            if (ball.y - ball.radius < 35) {
                ball.y = 35 + ball.radius;
                ball.dy = Math.abs(ball.dy);
                playSound('hit');
            }

            if (ball.y + ball.radius >= paddle.y && ball.y - ball.radius <= paddle.y + paddle.height &&
                ball.x >= paddle.x && ball.x <= paddle.x + paddle.width && ball.dy > 0) {
                
                playSound('hit');
                triggerShake(4);
                combo = 1;

                let hitPoint = ball.x - (paddle.x + paddle.width / 2);
                let normalizedHit = hitPoint / (paddle.width / 2);
                let bounceAngle = normalizedHit * (Math.PI / 2.3);

                ball.dx = ball.speed * Math.sin(bounceAngle);
                ball.dy = -ball.speed * Math.cos(bounceAngle);
                ball.y = paddle.y - ball.radius;
            }

            for (let b of bricks) {
                if (b.status === 1) {
                    if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + b.width &&
                        ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + b.height) {
                        
                        let overlapLeft = (ball.x + ball.radius) - b.x;
                        let overlapRight = (b.x + b.width) - (ball.x - ball.radius);
                        let overlapTop = (ball.y + ball.radius) - b.y;
                        let overlapBottom = (b.y + b.height) - (ball.y - ball.radius);

                        let minOverlapX = Math.min(overlapLeft, overlapRight);
                        let minOverlapY = Math.min(overlapTop, overlapBottom);

                        if (minOverlapX < minOverlapY) {
                            ball.dx = -ball.dx;
                        } else {
                            ball.dy = -ball.dy;
                        }

                        b.health--;
                        playSound('brick');
                        triggerShake(5);

                        if (b.health <= 0) {
                            b.status = 0;
                            score += 25 * level * combo;
                            combo++;
                            spawnPowerUp(b.x, b.y);
                        } else {
                            score += 15;
                        }
                        break;
                    }
                }
            }

            if (ball.y - ball.radius > canvas.height) {
                if (paddle.hasShield) {
                    paddle.hasShield = false;
                    ball.dy = -Math.abs(ball.dy);
                    ball.y = paddle.y - 12;
                    playSound('shield');
                } else {
                    balls.splice(i, 1);
                }
            }
        }

        if (balls.length === 0) {
            lives--;
            combo = 1;
            paddle.width = basePaddleWidth; 
            playSound('loss');
            triggerShake(10);
            if (lives <= 0) {
                gameState = 'GAMEOVER';
                gameoverTitle.innerText = "SYSTEM FAIL";
                finalScore.innerText = score;
                gameOverScreen.classList.remove('hidden');
                hud.classList.add('hidden');
            } else {
                resetBallAndKeepPaddle();
            }
        }

        let activeBricks = bricks.filter(b => b.status === 1).length;
        if (activeBricks === 0) {
            level++;
            playSound('powerup');
            loadLevel();
        }

        scoreVal.innerText = score;
        comboVal.innerText = combo;
        livesVal.innerText = lives;
        levelVal.innerText = level;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // رسم حدود إضافية داخلية داخل الكانفاس لتوضيح الإطار (Boarders)
        ctx.strokeStyle = 'rgba(57, 255, 20, 0.2)';
        ctx.lineWidth = 2;
        ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);

        ctx.save();
        if (shakeTimer > 0) {
            shakeTimer--;
            let offsetX = (Math.random() - 0.5) * 4;
            let offsetY = (Math.random() - 0.5) * 4;
            ctx.translate(offsetX, offsetY);
        }

        if (paddle.hasShield) {
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00f3ff';
            ctx.beginPath();
            ctx.moveTo(20, canvas.height - 12);
            ctx.lineTo(canvas.width - 20, canvas.height - 12);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        for (let b of bricks) {
            if (b.status === 1) {
                ctx.fillStyle = '#020005';
                ctx.strokeStyle = b.color;
                ctx.lineWidth = b.health > 1 ? 2.5 : 1.5;
                ctx.shadowBlur = b.health > 1 ? 10 : 2;
                ctx.shadowColor = b.color;
                
                ctx.fillRect(b.x, b.y, b.width, b.height);
                ctx.strokeRect(b.x, b.y, b.width, b.height);

                drawShape(b.shape, b.x + b.width / 2, b.y + b.height / 2, Math.min(b.width, b.height), b.color);
                
                if (b.health > 1) {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 8px Courier New';
                    ctx.fillText(b.health + 'H', b.x + b.width / 2 - 5, b.y + b.height / 2 + 3);
                }

                ctx.shadowBlur = 0;
            }
        }

        ctx.shadowBlur = 12;
        ctx.shadowColor = '#39ff14';
        ctx.fillStyle = '#39ff14';
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        ctx.shadowBlur = 0;
        
        if (paddle.hasLasers) {
            ctx.fillStyle = '#00f3ff';
            ctx.fillRect(paddle.x + 10, paddle.y - 4, 3, 4);
            ctx.fillRect(paddle.x + paddle.width - 13, paddle.y - 4, 3, 4);
        }

        for (let ball of balls) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ff007f';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff007f';
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        ctx.fillStyle = '#00f3ff';
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#00f3ff';
        for (let l of lasers) {
            ctx.fillRect(l.x, l.y, l.width, l.height);
        }
        ctx.shadowBlur = 0;

        for (let p of powerUps) {
            ctx.strokeStyle = '#ffe600';
            ctx.fillStyle = '#ffe600';
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ffe600';
            ctx.strokeRect(p.x, p.y, p.width, p.height);
            ctx.font = 'bold 8px Courier New';
            ctx.fillText(p.type, p.x + 3, p.y + 8);
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>

</body>
</html>
